<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Tab Groups List</title>    
    <link rel="stylesheet" href="groupList.css">    
</head>
<body>
    <div id="header">        
        <span id="status"></span>
        <span id="info-btn"></span>    
    </div>

    <div id="toolbar">
        <input type="search" id="search-input" placeholder="Filter groups..." />        
        <button type="button" id="sort-btn">A↓Z</button>
    </div>
    
    <div id="scrollArea">
        <ul id="tabGroupsList"></ul>
    </div>
      
    <dialog id="dialog">        
        <h4>Tab Groups List</h4>
        <span id="version-label"></span>
        <span>by Marek Mauder</span>
        <a href="https://github.com/galfar/ext-groups-list" target="_blank">
            Visit GitHub page
        </a>
        <a href="https://chromewebstore.google.com/detail/poijigbgelgofcabnmlmaiclcmgfmabk/reviews" target="_blank">
            Write a review
        </a>
                
        <form method="dialog">
          <button type="submit" autofocus>Close</button>
        </form>
      </dialog>

    <script type="module" src="./popup.js"></script>    
</body>
</html>
